<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — OptiStock</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <a href="/" class="logo" style="text-decoration:none;font-size:1.5rem;font-weight:800;color:var(--primary);margin-bottom:24px;display:block;">📦 OptiStock</a>
        <h2 style="font-size:1.5rem;font-weight:700;margin-bottom:8px;">Create your account</h2>
        <p class="auth-sub">Start optimizing your inventory in minutes</p>

        <form id="signup-form" class="auth-form" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="John Smith" autocomplete="name">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="john@company.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Min. 8 characters" minlength="8" autocomplete="new-password">
                <div class="password-strength" id="password-strength"></div>
            </div>
            <div id="signup-error" class="error-msg" style="display:none;"></div>
            <button type="submit" class="btn btn-primary btn-full" id="signup-btn">Create Account</button>
        </form>

        <p class="auth-footer">
            Already have an account? <a href="/static/login.html">Sign in</a>
        </p>
    </div>

    <script>
    // Password strength checker
    document.getElementById('password').addEventListener('input', function() {
        const pw = this.value;
        const el = document.getElementById('password-strength');
        let strength = 0;
        if (pw.length >= 8) strength++;
        if (/[A-Z]/.test(pw)) strength++;
        if (/[0-9]/.test(pw)) strength++;
        if (/[^A-Za-z0-9]/.test(pw)) strength++;

        const levels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
        const colors = ['', '#ef4444', '#f59e0b', '#0ea5e9', '#06d6a0'];
        el.textContent = levels[strength] || '';
        el.style.color = colors[strength] || 'transparent';
    });

    async function handleSignup(e) {
        e.preventDefault();
        const btn = document.getElementById('signup-btn');
        const error = document.getElementById('signup-error');
        btn.disabled = true;
        btn.textContent = 'Creating account...';
        error.style.display = 'none';

        try {
            const res = await fetch('/v1/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail?.error || data.detail || 'Signup failed');

            // Show success, redirect to login
            document.querySelector('.auth-container').innerHTML = `
                <a href="/" class="logo" style="text-decoration:none;font-size:1.5rem;font-weight:800;color:var(--primary);margin-bottom:24px;display:block;">📦 OptiStock</a>
                <h2 style="font-size:1.5rem;font-weight:700;margin-bottom:8px;">Account Created! 🎉</h2>
                <p class="auth-sub">Check your email for a verification link, then <a href="/static/login.html">sign in</a>.</p>
                <a href="/static/login.html" class="btn btn-primary btn-full">Go to Login</a>
            `;
        } catch (err) {
            error.textContent = err.message;
            error.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Create Account';
        }
    }
    </script>
</body>
</html>
